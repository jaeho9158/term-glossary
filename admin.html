<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>관리자 - 논문용어사전</title>
<meta name="robots" content="noindex, nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>
<body data-base="">
<header class="site-header">
  <div class="inner">
    <a class="logo" href="index.html">논문용어사전</a>
    <div class="header-search">
      <input type="search" id="global-term-search" class="header-search-input" placeholder="용어 검색" aria-label="용어 검색" autocomplete="off">
      <ul id="global-term-search-results" class="header-search-results" hidden></ul>
    </div>
    <button
      id="menu-toggle"
      class="menu-toggle"
      aria-label="메뉴"
      aria-expanded="false">
      ☰
    </button>

    <nav id="site-nav" class="site-nav">
      <a href="index.html">용어 목록</a>
      <a href="viewer.html" class="nav-cta">논문 뷰어</a>
      <a href="about.html">소개</a>
      <a href="contact.html">문의</a>
    </nav>
  </div>
</header>

<main class="delay-1">
  <h1>관리자</h1>
  <p class="subtitle">문의 메시지를 확인하려면 관리자 코드를 입력하세요.</p>

  <form id="admin-login-form" class="contact-form">
    <label for="admin-code">관리자 코드</label>
    <input type="password" id="admin-code" name="code" autocomplete="off" required>
    <button type="submit" id="admin-login-btn">확인</button>
    <p id="admin-login-status" role="status" aria-live="polite"></p>
  </form>

  <div id="admin-panel" hidden>
    <div class="admin-panel-header">
      <p class="subtitle">접수된 문의 메시지</p>
      <button id="admin-logout-btn" type="button" class="admin-logout-btn">로그아웃</button>
    </div>
    <ul id="admin-message-list" class="admin-message-list"></ul>
  </div>
</main>

<footer class="site-footer">
  <p>&copy; 2026 논문용어사전. All rights reserved.</p>
  <a href="about.html">소개</a> · <a href="privacy.html">개인정보처리방침</a> · <a href="contact.html">문의</a>
</footer>
<script src="assets/vendor/fuse.min.js"></script>
<script src="assets/header-search.js"></script>
<script type="module" src="assets/admin.js"></script>
<script src="assets/mobile-nav.js"></script>
</body>
</html>
