<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>문의 - 논문용어사전</title>
<meta name="description" content="논문용어사전에 다루었으면 하는 용어를 제안하거나 오류를 제보하고 싶다면 문의 남겨 주세요.">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="canonical" href="https://jaeho9158.github.io/term-glossary/contact.html">
<link rel="stylesheet" href="style.css">
</head>
<body data-base="">
<header class="site-header">
  <div class="inner">
    <a class="logo" href="index.html">논문용어사전</a>
    <div class="header-search">
      <input type="search" id="global-term-search" class="header-search-input" placeholder="용어 검색" aria-label="용어 검색" autocomplete="off">
      <ul id="global-term-search-results" class="header-search-results" hidden></ul>
    </div>
    <button
      id="menu-toggle"
      class="menu-toggle"
      aria-label="메뉴"
      aria-expanded="false">
      ☰
    </button>

    <nav id="site-nav" class="site-nav">
      <a href="index.html">용어 목록</a>
      <a href="viewer.html" class="nav-cta">논문 뷰어</a>
      <a href="about.html">소개</a>
      <a href="contact.html">문의</a>
      <a href="login.html" id="nav-login">로그인</a>
      <a href="signup.html" id="nav-signup">회원가입</a>
      <a href="history.html" id="nav-history" hidden>내 기록</a>
      <a href="#" id="nav-logout" hidden>로그아웃</a>
    </nav>
  </div>
</header>

<main class="delay-1">
  <h1>문의</h1>
  <p class="subtitle">다루었으면 하는 용어 제안, 설명 오류 제보, 기타 문의를 남겨 주시면 확인 후 반영하겠습니다.</p>

  <form id="contact-form" class="contact-form">
    <label for="contact-name">이름 (선택)</label>
    <input type="text" id="contact-name" name="name" autocomplete="name">

    <label for="contact-email">이메일 (선택, 답변 받으실 경우)</label>
    <input type="email" id="contact-email" name="email" autocomplete="email">

    <label for="contact-message">문의 내용</label>
    <textarea id="contact-message" name="message" required placeholder="다루었으면 하는 용어, 오류 제보, 기타 문의를 적어주세요."></textarea>

    <button type="submit" id="contact-submit-btn">보내기</button>
    <p id="contact-status" role="status" aria-live="polite"></p>
  </form>
</main>
