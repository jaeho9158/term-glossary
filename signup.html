<main class="delay-1">
  <h1>회원가입</h1>
  <p class="subtitle">이메일과 비밀번호로 계정을 만드세요.</p>

  <form id="signup-form" class="contact-form">
    <label for="signup-email">이메일</label>
    <input type="email" id="signup-email" name="email" autocomplete="email" required>

    <label for="signup-password">비밀번호</label>
    <input type="password" id="signup-password" name="password" autocomplete="new-password" minlength="6" required>

    <button type="submit" id="signup-submit-btn">회원가입</button>
    <p id="signup-status" role="status" aria-live="polite"></p>
  </form>

  <p class="auth-switch-link">이미 계정이 있으신가요? <a href="login.html">로그인</a></p>
</main>
