<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>논문 뷰어 - 논문 텍스트에서 학술용어 찾기 | 논문용어사전</title>
<meta name="description" content="논문 본문을 붙여넣으면 사전에 등록된 통계·연구방법론 학술용어를 자동으로 찾아 우측에 보여주는 논문 뷰어입니다.">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="canonical" href="https://jaeho9158.github.io/term-glossary/viewer.html">
<meta property="og:title" content="논문 뷰어 - 논문용어사전">
<meta property="og:description" content="논문 본문을 붙여넣으면 등록된 학술용어를 자동으로 찾아줍니다.">
<meta property="og:type" content="website">
<link rel="stylesheet" href="style.css">
</head>
<body data-base="">
<header class="site-header">
  <div class="inner">
    <a class="logo" href="index.html">논문용어사전</a>
    <div class="header-search">
      <input type="search" id="global-term-search" class="header-search-input" placeholder="용어 검색" aria-label="용어 검색" autocomplete="off">
      <ul id="global-term-search-results" class="header-search-results" hidden></ul>
    </div>
    <button
      id="menu-toggle"
      class="menu-toggle"
      aria-label="메뉴"
      aria-expanded="false">
      ☰
    </button>

    <nav id="site-nav" class="site-nav">
      <a href="index.html">용어 목록</a>
      <a href="viewer.html" class="nav-cta">논문 뷰어</a>
      <a href="about.html">소개</a>
      <a href="contact.html">문의</a>
    </nav>
  </div>
</header>

<main class="wide">
  <h1>논문 뷰어</h1>
  <p class="subtitle">논문 텍스트를 붙여넣으면 등록된 학술용어를 찾아 우측에 보여드립니다.</p>

  <div class="viewer-layout">
    <div class="viewer-input no-pdf" id="viewer-input-pane">
      <div class="search-area">
        <textarea id="paper-text" class="search-input" placeholder="논문 초록이나 본문 일부를 붙여넣어 보세요. 예: 본 연구는 유의확률(p-value)이 0.05 미만인 경우를 통계적으로 유의한 상관관계로 정의하였다."></textarea>
        <div id="pdf-viewer" class="pdf-viewer"></div>
      </div>
      <div class="viewer-input-actions">
        <button id="find-terms-btn" type="button" disabled>용어 찾기</button>
        <label class="pdf-upload-label" for="pdf-upload">📄 PDF 파일 선택</label>
        <input type="file" id="pdf-upload" accept="application/pdf" hidden>
      </div>
      <p id="pdf-status" hidden aria-live="polite"></p>
    </div>
    <aside class="viewer-terms">
      <input type="search" id="term-filter" placeholder="찾은 용어 내 검색" aria-label="찾은 용어 내 검색" disabled>
      <h2 id="matched-count">용어 찾기를 눌러보세요</h2>
      <ul class="term-list" id="matched-terms"></ul>
    </aside>
  </div>
</main>

<footer class="site-footer">
  <p>&copy; 2026 논문용어사전. All rights reserved.</p>
  <a href="about.html">소개</a> · <a href="privacy.html">개인정보처리방침</a> · <a href="contact.html">문의</a>
</footer>
<div id="pdf-modal" class="pdf-modal">
    <div class="pdf-modal-content">
        <button id="close-pdf">✕</button>
        <div id="pdf-full-view"></div>
    </div>
</div>
<script type="module">
  import * as pdfjsLib from "./assets/vendor/pdfjs/pdf.min.mjs";
  pdfjsLib.GlobalWorkerOptions.workerSrc = "./assets/vendor/pdfjs/pdf.worker.min.mjs";
  window.pdfjsLib = pdfjsLib;
</script>
<script src="assets/viewer.js"></script>
<script src="assets/header-search.js"></script>
</body>
</html>
